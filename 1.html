<body>
  <style>
  /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
overflow-x:hidden;
}

/* Animated Background */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#ff000022,transparent 40%),
radial-gradient(circle at bottom,#ff000015,transparent 50%);
z-index:-1;
}

.container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
align-items:center;
}

/* Left Box */
.left-box{
width:370px;
padding:35px;
border-radius:20px;
background:#111;
border:1px solid #333;
transition:.4s;
box-shadow:0 0 20px rgba(255,0,0,.15);
}

.left-box:hover{
transform:translateY(-8px);
box-shadow:0 0 35px red;
}

.left-box h1{
color:#fff;
font-size:36px;
margin-bottom:15px;
text-shadow:0 0 15px red;
}

.subtitle{
color:#bdbdbd;
line-height:28px;
margin-bottom:25px;
}

/* Contact Card */
.info-card{
display:flex;
align-items:center;
gap:15px;
background:#191919;
padding:18px;
margin-top:18px;
border-radius:15px;
border:1px solid #333;
transition:.4s;
}

.info-card:hover{
transform:translateX(8px);
box-shadow:0 0 25px red;
border-color:red;
}

.icon{
width:55px;
height:55px;
background:#ff000020;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
border-radius:50%;
}

.info-card h3{
color:#ff3d3d;
font-size:17px;
margin-bottom:4px;
}

.info-card a{
color:#fff;
text-decoration:none;
font-size:15px;
word-break:break-word;
}

/* Contact Form */
.contact-box{
width:420px;
padding:35px;
border-radius:20px;
background:#111;
border:1px solid #333;
transition:.4s;
box-shadow:0 0 20px rgba(255,0,0,.15);
}

.contact-box:hover{
box-shadow:0 0 35px red;
}

.contact-box h2{
text-align:center;
color:#fff;
margin-bottom:25px;
font-size:32px;
text-shadow:0 0 15px red;
}

.input-box{
margin-bottom:18px;
}

.input-box input,
.input-box textarea{
width:100%;
padding:15px;
background:#1a1a1a;
border:1px solid #333;
border-radius:12px;
color:#fff;
font-size:15px;
transition:.3s;
outline:none;
}

.input-box input::placeholder,
.input-box textarea::placeholder{
color:#888;
}

.input-box input:focus,
.input-box textarea:focus{
border-color:red;
box-shadow:0 0 18px red;
}

textarea{
height:140px;
resize:none;
}

/* Button */
button{
width:100%;
padding:15px;
background:red;
color:#fff;
font-size:17px;
font-weight:600;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.04);
box-shadow:0 0 30px red;
}

/* Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-content{
background:#111;
padding:30px;
width:320px;
border-radius:20px;
text-align:center;
border:1px solid red;
box-shadow:0 0 35px red;
animation:popup .35s ease;
}

@keyframes popup{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popup-icon{
font-size:55px;
margin-bottom:15px;
}

.popup-content h2{
color:#fff;
margin-bottom:10px;
}

.popup-content p{
color:#ccc;
margin-bottom:20px;
}

.popup-content button{
background:red;
}

/* Mobile */
@media(max-width:900px){

.container{
flex-direction:column;
}

.left-box,
.contact-box{
width:100%;
max-width:420px;
}

}


  
  </style>
  
 
  <!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
// EmailJS Init
emailjs.init("K8qpqTNNYIJgN0mVX");

// Elements
const form = document.getElementById("contact-form");
const btn = document.getElementById("sendBtn");

const successPopup = document.getElementById("successPopup");
const errorPopup = document.getElementById("errorPopup");

// Submit
form.addEventListener("submit", function(e){

e.preventDefault();

// Button Loading
btn.disabled = true;
btn.innerHTML = "Sending... ⏳";

emailjs.sendForm(
"service_x239vvz",
"template_eqdzepg",
this
)

.then(function(){

// Reset Form
form.reset();

// Restore Button
btn.disabled = false;
btn.innerHTML = "Send Message 🚀";

// Show Success Popup
successPopup.style.display="flex";

})

.catch(function(error){

console.log(error);

// Restore Button
btn.disabled=false;
btn.innerHTML="Send Message 🚀";

// Show Error Popup
errorPopup.style.display="flex";

});

});

// Close Success
function closeSuccess(){

successPopup.style.display="none";

}

// Close Error
function closeError(){

errorPopup.style.display="none";

}

// Close Popup Clicking Outside
window.onclick=function(e){

if(e.target==successPopup){

successPopup.style.display="none";

}

if(e.target==errorPopup){

errorPopup.style.display="none";

}

}
</script>
  
 
  
  
<div class="bg"></div>

<div class="container">

    <!-- Contact Information -->

    <div class="left-box">

        <h1>Let's Connect</h1>

        <p class="subtitle">
            Have a project or any question?<br>
            Send me a message.
        </p>

        <div class="info-card">

            <div class="icon">📞</div>

            <div>
                <h3>Phone Number</h3>
                <a href="tel:9169578612">
                    +91 9169578612
                </a>
            </div>

        </div>

        <div class="info-card">

            <div class="icon">📧</div>

            <div>
                <h3>Email Address</h3>
                <a href="mailto:sandesh9169sharma@gmail.com">
                    sandesh9169sharma@gmail.com
                </a>
            </div>

        </div>

    </div>

    <!-- Contact Form -->

    <div class="contact-box">

        <h2>Contact Us</h2>

        <form id="contact-form">

            <div class="input-box">

                <input
                type="text"
                name="name"
                placeholder="Your Name"
                required>

            </div>

            <div class="input-box">

                <input
                type="email"
                name="email"
                placeholder="Your Email"
                required>

            </div>

            <div class="input-box">

                <input
                type="text"
                name="subject"
                placeholder="Subject"
                required>

            </div>

            <div class="input-box">

                <textarea
                name="message"
                placeholder="Write your message..."
                required></textarea>

            </div>

            <button id="sendBtn" type="submit">

                Send Message 🚀

            </button>

        </form>

    </div>

</div>

<!-- Success Popup -->

<div id="successPopup" class="popup">

    <div class="popup-content">

        <div class="popup-icon">✅</div>

        <h2>Message Sent</h2>

        <p>Your message has been sent successfully.</p>

        <button onclick="closeSuccess()">
            OK
        </button>

    </div>

</div>

<!-- Error Popup -->

<div id="errorPopup" class="popup">

    <div class="popup-content">

        <div class="popup-icon">❌</div>

        <h2>Failed</h2>

        <p>Message Sending Failed.</p>

        <button onclick="closeError()">
            Close
        </button>

    </div>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</body>
